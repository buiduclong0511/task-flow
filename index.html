<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Time Tracker</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --danger: #ff4757;
    --warn: #ffa502;
    --success: #2ed573;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --active-glow: 0 0 20px rgba(232, 255, 71, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .header-meta {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    text-align: right;
  }

  #live-clock {
    font-size: 13px;
    color: var(--accent2);
    font-weight: 500;
  }

  /* Add task section */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .add-section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .add-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .input-wrap {
    flex: 1;
    min-width: 200px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
  }

  .btn-primary:hover { background: #d4eb3a; transform: translateY(-1px); }

  .btn-sm {
    padding: 6px 12px;
    font-size: 11px;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
  }

  .btn-danger:hover { background: rgba(255,71,87,0.1); border-color: var(--danger); }

  /* Active Task */
  .active-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 28px;
    box-shadow: var(--active-glow);
    position: relative;
    overflow: hidden;
  }

  .active-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .active-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .active-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .active-meta {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .timer-display {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }

  .active-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-pause {
    background: rgba(255,165,2,0.1);
    color: var(--warn);
    border: 1px solid var(--warn);
  }

  .btn-pause:hover { background: rgba(255,165,2,0.2); }

  .btn-done {
    background: rgba(46,213,115,0.1);
    color: var(--success);
    border: 1px solid var(--success);
  }

  .btn-done:hover { background: rgba(46,213,115,0.2); }

  /* Task Stack */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Task items */
  .task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
  }

  .task-item:hover { border-color: var(--muted); }

  .task-item.pending {
    border-left: 3px solid var(--warn);
    opacity: 0.85;
  }

  .task-item.done {
    opacity: 0.7;
    border-left: 3px solid var(--success);
  }


  .task-info { flex: 1; min-width: 0; }

  .task-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .task-name.done-text { text-decoration: line-through; color: var(--text); opacity: 0.7; }

  .task-time-info {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .time-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .time-chip.elapsed { color: var(--accent2); }
  .time-chip.pending-time { color: var(--warn); }

  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 12px;
    line-height: 2;
  }

  /* Summary */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.green { color: var(--success); }
  .stat-value.red { color: var(--danger); }

  /* No active */
  .no-active {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  /* Tooltip-like status */
  .status-pill {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .status-active { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.3); }
  .status-pending { background: rgba(255,165,2,0.1); color: var(--warn); border: 1px solid rgba(255,165,2,0.3); }
  .status-done { background: rgba(46,213,115,0.1); color: var(--success); border: 1px solid rgba(46,213,115,0.3); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* Auth UI */
  .auth-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-google {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }

  .btn-google img {
    width: 16px;
    height: 16px;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }

  .user-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

  .auth-wall {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    line-height: 2;
  }

  .auth-wall .btn-google {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 14px;
  }

  .sync-status {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sync-status.syncing { color: var(--accent2); }
  .sync-status.synced { color: var(--success); }
  .sync-status.error { color: var(--danger); }

  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .header { margin-bottom: 24px; }
    .logo { font-size: 22px; }
    .timer-display { font-size: 24px; }
    .active-name { font-size: 16px; }
    .active-card { padding: 16px; }
    .active-meta { gap: 10px; flex-direction: column; align-items: flex-start; }
    .active-actions { flex-direction: column; }
    .active-actions .btn { width: 100%; justify-content: center; }
    .add-row { flex-direction: column; }
    .add-row select, .add-row .btn { width: 100%; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 16px; }
    .task-item { padding: 12px; gap: 10px; flex-wrap: wrap; }
    .task-actions { width: 100%; justify-content: flex-end; }
    .task-name { white-space: normal; }
    .task-time-info { font-size: 11px; }
  }
</style>
</head>
<body>
<div id="sync-status" class="sync-status" style="position:fixed;top:12px;right:16px;z-index:10;"></div>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">Task<span>Flow</span> <span style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:400;">v1.1.3</span></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">Time tracking for interrupted workflows</div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;">
      <div class="header-meta">
        <div style="display:flex;align-items:center;gap:12px;">
          <div id="live-clock">--:--:--</div>
          <div id="today-date" style="color:var(--muted);white-space:nowrap;">--</div>
        </div>
      </div>
      <div id="auth-bar" class="auth-bar"></div>
    </div>
  </div>

  <!-- Auth Wall (shown when not logged in) -->
  <div id="auth-wall" class="auth-wall" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px;">&#9201;</div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;">Chào mừng đến TaskFlow</div>
    <div>Đăng nhập để đồng bộ tasks trên mọi thiết bị</div>
    <button class="btn-google" onclick="googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" />
      Đăng nhập với Google
    </button>
  </div>

  <!-- App content (hidden when not logged in) -->
  <div id="app-content" style="display:none;">

  <!-- Stats -->
  <div class="summary-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Hôm nay</div>
      <div class="stat-value accent" id="stat-total">00:00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Đang chạy</div>
      <div class="stat-value blue" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bị pending</div>
      <div class="stat-value red" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hoàn thành</div>
      <div class="stat-value green" id="stat-done">0</div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-section">
    <div class="add-section-title">// Thêm task mới</div>
    <div class="add-row">
      <div class="input-wrap">
        <input type="text" id="task-input" placeholder="Tên task (vd: Fix bug #142, Review PR...)" autocomplete="off" />
      </div>
      <input type="text" id="estimate-input" inputmode="decimal" placeholder="Giờ (vd: 0.5, 1, 2)" style="width:140px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;" />
      <button class="btn btn-primary" onclick="addTask()">
        ＋ Thêm & Bắt đầu
      </button>
    </div>
  </div>

  <!-- Active Task -->
  <div id="active-section"></div>

  <!-- Pending Stack -->
  <div id="pending-section"></div>

  <!-- Done -->
  <div id="done-section"></div>

  </div><!-- /app-content -->

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // ── Firebase Config ─────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDa9plj2Aud57nIozm1wTnDUVguUvR-TVI",
    authDomain: "task-flow-230d3.firebaseapp.com",
    projectId: "task-flow-230d3",
    storageBucket: "task-flow-230d3.firebasestorage.app",
    messagingSenderId: "21819695719",
    appId: "1:21819695719:web:94131182a2fa35cc962ac2",
    measurementId: "G-FZWWDHM69B"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const googleProvider = new firebase.auth.GoogleAuthProvider();

  // ── State ──────────────────────────────────────────────
  let tasks = [];
  let activeId = null;
  let tickInterval = null;
  let currentUser = null;
  let unsubFirestore = null;

  // ── Helpers ────────────────────────────────────────────
  function fmtTime(ms) {
    if (ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
  }

  function fmtShort(ms) {
    if (ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m ${s % 60}s`;
  }

  function getElapsed(task) {
    let total = task.elapsed || 0;
    if (task.status === 'active' && task.startedAt) {
      total += Date.now() - task.startedAt;
    }
    return total;
  }

  function save() {
    hasUserInteracted = true;
    // Local cache (luôn lưu ngay)
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
    localStorage.setItem('taskflow_active', activeId || '');
    // Debounce sync to Firestore (2s)
    if (currentUser && !isSyncingFromRemote) debouncedSync();
  }

  // ── Auth ─────────────────────────────────────────────────
  function googleLogin() {
    auth.signInWithPopup(googleProvider).catch(err => {
      console.error('Login failed:', err);
      alert('Đăng nhập thất bại: ' + err.message);
    });
  }

  function logout() {
    auth.signOut();
  }

  function renderAuthBar() {
    const el = document.getElementById('auth-bar');
    if (currentUser) {
      el.innerHTML = `
        <div class="user-info">
          <img class="user-avatar" src="${escHtml(currentUser.photoURL || '')}" alt="" referrerpolicy="no-referrer" />
          <span class="user-name">${escHtml(currentUser.displayName || currentUser.email)}</span>
        </div>
        <button class="btn-logout" onclick="logout()">Đăng xuất</button>`;
    } else {
      el.innerHTML = '';
    }
  }

  let syncHideTimer = null;
  let syncDebounceTimer = null;
  let localDataHash = '';
  let isSyncingFromRemote = false;
  let hasUserInteracted = false;

  function setSyncStatus(status, text) {
    if (!hasUserInteracted) return;
    const el = document.getElementById('sync-status');
    el.className = 'sync-status ' + status;
    el.textContent = text;
    el.style.display = '';
    clearTimeout(syncHideTimer);
    if (status === 'synced') {
      syncHideTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
  }

  function computeDataHash() {
    return JSON.stringify({ tasks, activeId: activeId || null });
  }

  // ── Firestore Sync ──────────────────────────────────────
  async function syncToFirestore() {
    if (!currentUser) return;
    const hash = computeDataHash();
    if (hash === localDataHash) return; // Không thay đổi → bỏ qua
    localDataHash = hash;

    setSyncStatus('syncing', 'Đang đồng bộ...');
    try {
      const docRef = db.collection('users').doc(currentUser.uid);
      await docRef.set({
        tasks: JSON.parse(JSON.stringify(tasks)),
        activeId: activeId || null,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      setSyncStatus('synced', '✓ Đã đồng bộ');
    } catch (err) {
      localDataHash = ''; // Reset để retry lần sau
      console.error('Sync failed:', err);
      setSyncStatus('error', '✕ Lỗi đồng bộ');
    }
  }

  function debouncedSync() {
    if (!currentUser) return;
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(syncToFirestore, 2000);
  }

  function flushSync() {
    if (syncDebounceTimer) {
      clearTimeout(syncDebounceTimer);
      syncDebounceTimer = null;
      return syncToFirestore();
    }
    return Promise.resolve();
  }

  function listenFirestore() {
    if (unsubFirestore) unsubFirestore();
    if (!currentUser) return;

    const docRef = db.collection('users').doc(currentUser.uid);
    unsubFirestore = docRef.onSnapshot(async snap => {
      if (!snap.exists) {
        syncToFirestore();
        return;
      }
      const data = snap.data();
      if (!data.tasks) return;

      const remoteHash = JSON.stringify({ tasks: data.tasks, activeId: data.activeId || null });
      if (remoteHash === localDataHash) {
        setSyncStatus('synced', '✓ Đã đồng bộ');
        return;
      }

      // Nếu đang có thay đổi local chưa sync → flush lên trước
      if (syncDebounceTimer) {
        await flushSync();
        // Sau khi flush, snapshot mới sẽ fire lại → xử lý ở lần sau
        return;
      }

      isSyncingFromRemote = true;
      tasks = data.tasks;
      activeId = data.activeId || null;
      localDataHash = computeDataHash();
      localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
      localStorage.setItem('taskflow_active', activeId || '');
      render();
      setSyncStatus('synced', '✓ Đã đồng bộ');
      isSyncingFromRemote = false;
    }, err => {
      console.error('Firestore listen error:', err);
      setSyncStatus('error', '✕ Lỗi kết nối');
    });
  }

  // ── Auth State Listener ─────────────────────────────────
  auth.onAuthStateChanged(user => {
    currentUser = user;
    renderAuthBar();

    if (user) {
      document.getElementById('auth-wall').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';
      // Load from local cache first for instant display
      tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
      activeId = localStorage.getItem('taskflow_active') || null;
      render();
      // Then listen to Firestore for real-time sync
      listenFirestore();
    } else {
      document.getElementById('auth-wall').style.display = 'block';
      document.getElementById('app-content').style.display = 'none';
      if (unsubFirestore) {
        unsubFirestore();
        unsubFirestore = null;
      }
      tasks = [];
      activeId = null;
    }
  });

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }


  // ── Core Actions ───────────────────────────────────────
  function addTask() {
    const input = document.getElementById('task-input');
    const estimateInput = document.getElementById('estimate-input');
    const name = input.value.trim();
    const estimateHours = parseFloat(estimateInput.value) || 0;
    let valid = true;

    input.style.borderColor = '';
    estimateInput.style.borderColor = '';

    if (!name) { input.style.borderColor = 'var(--danger)'; input.focus(); valid = false; }
    if (!valid) return;

    const estimateMs = estimateHours * 3600000;
    const task = {
      id: uid(),
      name,
      status: 'idle',
      elapsed: 0,
      estimateMs: estimateMs || null,
      notified20: false,
      startedAt: null,
      createdAt: Date.now(),
      completedAt: null,
    };

    tasks.unshift(task);
    input.value = '';
    estimateInput.value = '';

    // If there's an active task, pause it first
    if (activeId) {
      pauseTask(activeId, false);
    }

    startTask(task.id);
  }

  function startTask(id) {
    // Pause current active if any
    if (activeId && activeId !== id) {
      pauseTask(activeId, false);
    }

    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.status = 'active';
    task.startedAt = Date.now();
    activeId = id;
    save();
    render();
  }

  function pauseTask(id, doRender = true) {
    const task = tasks.find(t => t.id === id);
    if (!task || task.status !== 'active') return;
    task.elapsed += Date.now() - task.startedAt;
    task.startedAt = null;
    task.status = 'pending';
    if (activeId === id) activeId = null;
    save();
    if (doRender) render();
  }

  function doneTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    if (task.status === 'active') {
      task.elapsed += Date.now() - task.startedAt;
      task.startedAt = null;
    }
    task.status = 'done';
    task.completedAt = Date.now();
    if (activeId === id) activeId = null;
    save();
    render();
  }

  function deleteTask(id) {
    if (activeId === id) activeId = null;
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function resumeTask(id) {
    if (activeId && activeId !== id) {
      pauseTask(activeId, false);
    }
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.status = 'active';
    task.startedAt = Date.now();
    activeId = id;
    save();
    render();
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    clearInterval(tickInterval);

    renderActive();
    renderPending();
    renderDone();
    renderStats();

    // Tick every second for active timer and pending "time since"
    const hasPending = tasks.some(t => t.status === 'pending');
    if (activeId || hasPending) {
      tickInterval = setInterval(() => {
        if (activeId) {
          renderActive();
          checkDeadlineNotification();
        }
        if (hasPending) tickPendingSince();
        renderStats();
      }, 1000);
    }
  }

  function renderActive() {
    const el = document.getElementById('active-section');
    const task = activeId ? tasks.find(t => t.id === activeId) : null;

    if (!task || task.status !== 'active') {
      el.innerHTML = `<div class="no-active">
        <div style="font-size:24px;margin-bottom:8px;">⏸</div>
        Chưa có task nào đang chạy.<br>
        Thêm task mới hoặc resume task bị pending.
      </div>`;
      return;
    }

    const elapsed = getElapsed(task);
    el.innerHTML = `
      <div class="active-card">
        <div class="active-label">
          <span class="pulse"></span>
          ĐANG CHẠY
        </div>
        <div class="active-name">${escHtml(task.name)}</div>
        <div class="active-meta">
          <div class="timer-display" id="active-timer">${fmtTime(elapsed)}</div>
          ${task.estimateMs ? (() => {
            const remaining = task.estimateMs - elapsed;
            const color = remaining <= 0 ? 'var(--danger)' : remaining <= task.estimateMs * 0.2 ? 'var(--warn)' : 'var(--success)';
            const text = remaining > 0 ? '⏳ Còn: ' + fmtShort(remaining) : '⚠ Quá hạn: ' + fmtShort(Math.abs(remaining));
            return `<div style="font-size:18px;font-weight:600;color:${color};">${text}</div>`;
          })() : ''}
          <span class="status-pill status-active">ACTIVE</span>
        </div>
        <div class="active-actions">
          <button class="btn btn-pause" onclick="pauseTask('${task.id}')">⏸ Pause (nhận task mới)</button>
          <button class="btn btn-done" onclick="doneTask('${task.id}')">✓ Hoàn thành</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${task.id}')">✕</button>
        </div>
      </div>`;
  }

  function renderPending() {
    const el = document.getElementById('pending-section');
    const pending = tasks.filter(t => t.status === 'pending');

    let html = `<div class="section-header">
      <span class="section-title">// Stack — Đang pending</span>
      <span class="badge">${pending.length} tasks</span>
    </div>`;

    if (pending.length === 0) {
      html += `<div class="task-list"><div class="empty-state">Không có task nào đang bị pending</div></div>`;
    } else {
      html += `<div class="task-list">`;
      pending.forEach((task, i) => {
        const elapsed = getElapsed(task);
        html += `
        <div class="task-item pending">
          <div class="task-info">
            <div class="task-name">${escHtml(task.name)}</div>
            <div class="task-time-info">
              <span class="time-chip elapsed">⏱ Đã làm: ${fmtShort(elapsed)}</span>
              <span class="time-chip pending-time" data-pending-since="${task.startedAt || task.createdAt}">⏳ Pending từ: ${timeSince(task.startedAt || task.createdAt)}</span>
              ${estimateChip(task)}
            </div>
          </div>
          <div class="task-actions">
            <button class="btn btn-ghost btn-sm" onclick="resumeTask('${task.id}')">▶ Resume</button>
            <button class="btn btn-done btn-sm" style="padding:6px 12px;font-size:11px;" onclick="doneTask('${task.id}')">✓</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTask('${task.id}')">✕</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    el.innerHTML = html;
  }

  function estimateChip(task) {
    if (!task.estimateMs) return '';
    const elapsed = task.elapsed || getElapsed(task);
    const remaining = task.estimateMs - elapsed;
    if (remaining > 0) {
      return `<span class="time-chip" style="color:var(--success);">⏳ Còn: ${fmtShort(remaining)}</span>`;
    }
    return `<span class="time-chip" style="color:var(--danger);">⚠ Quá hạn: ${fmtShort(Math.abs(remaining))}</span>`;
  }

  function tickPendingSince() {
    document.querySelectorAll('[data-pending-since]').forEach(el => {
      const ts = Number(el.getAttribute('data-pending-since'));
      if (ts) el.textContent = '⏳ Pending từ: ' + timeSince(ts);
    });
  }

  function renderDone() {
    const el = document.getElementById('done-section');
    const done = tasks.filter(t => t.status === 'done').slice(0, 10);

    if (done.length === 0) { el.innerHTML = ''; return; }

    let html = `<div class="divider"></div>
    <div class="section-header">
      <span class="section-title">// Hoàn thành hôm nay</span>
      <span class="badge">${done.length}</span>
    </div>
    <div class="task-list">`;

    done.forEach(task => {
      const elapsed = task.elapsed || 0;
      html += `
      <div class="task-item done">
        <div class="task-info">
          <div class="task-name done-text">${escHtml(task.name)}</div>
          <div class="task-time-info">
            <span class="time-chip">Total: ${fmtShort(elapsed)} (${(elapsed / 3600000).toFixed(2)}h)</span>
              ${estimateChip(task)}
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${task.id}')">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;
    el.innerHTML = html;
  }

  function renderStats() {
    const active = tasks.find(t => t.status === 'active');
    const pending = tasks.filter(t => t.status === 'pending');
    const done = tasks.filter(t => t.status === 'done');

    const totalMs = tasks.reduce((s, t) => s + getElapsed(t), 0);

    document.getElementById('stat-total').textContent = fmtTime(totalMs);
    document.getElementById('stat-active').textContent = active ? fmtTime(getElapsed(active)) : '—';
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-done').textContent = done.length;
  }

  function timeSince(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    return fmtShort(diff) + ' trước';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Notifications ────────────────────────────────────────
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  function sendNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: 'favicon.png' });
    }
  }

  function checkDeadlineNotification() {
    const task = activeId ? tasks.find(t => t.id === activeId) : null;
    if (!task || !task.estimateMs) return;
    const elapsed = getElapsed(task);
    const remaining = task.estimateMs - elapsed;
    if (remaining <= 0) return;

    const pct = remaining / task.estimateMs;
    const isLargeTask = task.estimateMs > 1800000; // > 0.5h

    if (!task.notifiedAt) task.notifiedAt = {};

    if (isLargeTask) {
      if (pct <= 0.10 && !task.notifiedAt.p10) {
        task.notifiedAt.p10 = true;
        save();
        sendNotification('TaskFlow — Còn 10% thời gian!', `"${task.name}" chỉ còn ${fmtShort(remaining)}`);
      } else if (pct <= 0.25 && !task.notifiedAt.p25) {
        task.notifiedAt.p25 = true;
        save();
        sendNotification('TaskFlow — Còn 25% thời gian!', `"${task.name}" chỉ còn ${fmtShort(remaining)}`);
      } else if (pct <= 0.50 && !task.notifiedAt.p50) {
        task.notifiedAt.p50 = true;
        save();
        sendNotification('TaskFlow — Còn 50% thời gian', `"${task.name}" chỉ còn ${fmtShort(remaining)}`);
      }
    } else {
      if (pct <= 0.20 && !task.notifiedAt.p20) {
        task.notifiedAt.p20 = true;
        save();
        sendNotification('TaskFlow — Sắp hết thời gian!', `"${task.name}" chỉ còn ${fmtShort(remaining)}`);
      }
    }
  }

  // ── Clock ──────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('live-clock').textContent =
      now.toLocaleTimeString('vi-VN', { hour12: false });
    document.getElementById('today-date').textContent =
      now.toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  setInterval(updateClock, 1000);
  updateClock();

  // ── Enter key ──────────────────────────────────────────
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
    else e.target.style.borderColor = '';
  });

  // ── Estimate input: only allow decimal numbers ────────
  document.getElementById('estimate-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { addTask(); return; }
    e.target.style.borderColor = '';
    const allowed = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'];
    if (allowed.includes(e.key)) return;
    if (e.key === '.' && !e.target.value.includes('.')) return;
    if (e.key >= '0' && e.key <= '9') return;
    e.preventDefault();
  });

  // ── Service Worker ─────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }

  // ── Init ───────────────────────────────────────────────
  // render() is called by auth.onAuthStateChanged
</script>
</body>
</html>
